services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tabylga}
      POSTGRES_USER: ${POSTGRES_USER:-tabylga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tabylga}
    ports:
      - "5432:5432"
    volumes:
      - tabylga_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tabylga} -d ${POSTGRES_DB:-tabylga}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-Tabylga API}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Bishkek}
      CHECK_IN_RADIUS_METERS: ${CHECK_IN_RADIUS_METERS:-250}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tabylga:tabylga@db:5432/tabylga}
      OPEN_ROUTE_SERVICE_API_KEY: ${OPEN_ROUTE_SERVICE_API_KEY:-}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org/v2}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  tabylga_postgres_data:
